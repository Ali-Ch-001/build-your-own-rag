{{- if not .Values.externalSecrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "atlas-rag.fullname" . }}-runtime
  labels:
    {{- include "atlas-rag.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.runtimeSecret }}
  {{- range $key, $value := . }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
  DATABASE_URL: {{ printf "postgresql+asyncpg://%s:%s@%s:%s/%s?ssl=require" .Values.runtimeSecret.dbUsername .Values.runtimeSecret.dbPassword .Values.runtimeSecret.dbHost .Values.runtimeSecret.dbPort .Values.runtimeSecret.dbName }}
  REDIS_URL: {{ .Values.config.REDIS_URL | default "redis://localhost:6379/0" }}
  OPENAI_API_KEY: {{ .Values.runtimeSecret.openaiApiKey | default "" }}
  TAVILY_API_KEY: {{ .Values.runtimeSecret.tavilyApiKey | default "" }}
  AUTH0_DOMAIN: {{ .Values.runtimeSecret.auth0Domain | default "" }}
  AUTH0_AUDIENCE: {{ .Values.runtimeSecret.auth0Audience | default "" }}
  CITATION_HMAC_SECRET: {{ .Values.runtimeSecret.citationHmacSecret | default (randAlphaNum 32) }}
  QDRANT_API_KEY: {{ .Values.runtimeSecret.qdrantApiKey | default "" }}
{{- end }}
