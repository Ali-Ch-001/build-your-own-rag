name: Release to GitOps

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Protected GitHub environment and GitOps overlay
        required: true
        type: choice
        options:
          - staging
          - production
      ref:
        description: Tested commit, tag, or branch to release
        required: true
        default: main
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build immutable images
    runs-on: ubuntu-24.04
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      api_digest: ${{ steps.api.outputs.digest }}
      frontend_digest: ${{ steps.frontend.outputs.digest }}
      api_repository: ${{ steps.repositories.outputs.api }}
      frontend_repository: ${{ steps.repositories.outputs.frontend }}
      release_sha: ${{ steps.release.outputs.sha }}
      release_tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - id: release
        run: |
          sha="$(git rev-parse HEAD)"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${sha}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: atlas-rag-${{ github.run_id }}
      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - id: repositories
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          API_REPOSITORY: ${{ vars.API_ECR_REPOSITORY }}
          FRONTEND_REPOSITORY: ${{ vars.FRONTEND_ECR_REPOSITORY }}
        run: |
          test -n "$API_REPOSITORY"
          test -n "$FRONTEND_REPOSITORY"
          echo "api=${REGISTRY}/${API_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "frontend=${REGISTRY}/${FRONTEND_REPOSITORY}" >> "$GITHUB_OUTPUT"
      - name: Validate frontend build contract
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_DEFAULT_CORPUS_ID: ${{ vars.NEXT_PUBLIC_DEFAULT_CORPUS_ID }}
          NEXT_PUBLIC_AUTH0_DOMAIN: ${{ vars.NEXT_PUBLIC_AUTH0_DOMAIN }}
          NEXT_PUBLIC_AUTH0_CLIENT_ID: ${{ vars.NEXT_PUBLIC_AUTH0_CLIENT_ID }}
          NEXT_PUBLIC_AUTH0_AUDIENCE: ${{ vars.NEXT_PUBLIC_AUTH0_AUDIENCE }}
        run: |
          test -n "$NEXT_PUBLIC_API_URL"
          test -n "$NEXT_PUBLIC_DEFAULT_CORPUS_ID"
          test -n "$NEXT_PUBLIC_AUTH0_DOMAIN"
          test -n "$NEXT_PUBLIC_AUTH0_CLIENT_ID"
          test -n "$NEXT_PUBLIC_AUTH0_AUDIENCE"
      - uses: docker/setup-buildx-action@v4
      - id: api
        name: Build and publish API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.repositories.outputs.api }}:${{ steps.release.outputs.tag }}
          cache-from: type=gha,scope=release-api
          cache-to: type=gha,mode=max,scope=release-api
      - id: frontend
        name: Build and publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: deploy/docker/frontend.Dockerfile
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.repositories.outputs.frontend }}:${{ steps.release.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_DEFAULT_CORPUS_ID=${{ vars.NEXT_PUBLIC_DEFAULT_CORPUS_ID }}
            NEXT_PUBLIC_AUTH0_DOMAIN=${{ vars.NEXT_PUBLIC_AUTH0_DOMAIN }}
            NEXT_PUBLIC_AUTH0_CLIENT_ID=${{ vars.NEXT_PUBLIC_AUTH0_CLIENT_ID }}
            NEXT_PUBLIC_AUTH0_AUDIENCE=${{ vars.NEXT_PUBLIC_AUTH0_AUDIENCE }}
          cache-from: type=gha,scope=release-frontend
          cache-to: type=gha,mode=max,scope=release-frontend

  gitops:
    name: Propose digest promotion
    needs: publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Update release contract
        uses: mikefarah/yq@v4.47.2
        with:
          cmd: >-
            yq -i
            '.api.image.repository = "${{ needs.publish.outputs.api_repository }}" |
            .api.image.tag = "${{ needs.publish.outputs.release_tag }}" |
            .api.image.digest = "${{ needs.publish.outputs.api_digest }}" |
            .frontend.image.repository = "${{ needs.publish.outputs.frontend_repository }}" |
            .frontend.image.tag = "${{ needs.publish.outputs.release_tag }}" |
            .frontend.image.digest = "${{ needs.publish.outputs.frontend_digest }}" |
            .ingestionWorker.image.repository = "${{ needs.publish.outputs.api_repository }}" |
            .ingestionWorker.image.tag = "${{ needs.publish.outputs.release_tag }}" |
            .ingestionWorker.image.digest = "${{ needs.publish.outputs.api_digest }}" |
            .deletionWorker.image.repository = "${{ needs.publish.outputs.api_repository }}" |
            .deletionWorker.image.tag = "${{ needs.publish.outputs.release_tag }}" |
            .deletionWorker.image.digest = "${{ needs.publish.outputs.api_digest }}"'
            deploy/environments/${{ inputs.environment }}/values.yaml
      - name: Open GitOps promotion PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          branch: release/${{ inputs.environment }}/${{ needs.publish.outputs.release_sha }}
          delete-branch: true
          commit-message: Release ${{ needs.publish.outputs.release_sha }} to ${{ inputs.environment }}
          title: Release `${{ needs.publish.outputs.release_sha }}` to `${{ inputs.environment }}`
          body: |
            Promotes the tested API and frontend artifacts by immutable ECR digest.

            Terraform is not applied by this workflow. Merge only after reviewing the rendered GitOps diff and environment checks.
          add-paths: deploy/environments/${{ inputs.environment }}/values.yaml
          labels: deployment,${{ inputs.environment }}
